<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela Copa do Mundo 2026 ⚽</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #00a86b;
    --verde-escuro: #007a4d;
    --amarelo: #f5c518;
    --azul: #0a2342;
    --azul-medio: #133766;
    --cinza: #1a1a2e;
    --cinza-claro: #2a2a45;
    --branco: #f0f4f8;
    --texto: #e8ecf0;
    --texto-muted: #8892a4;
    --borda: rgba(255,255,255,0.08);
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Barlow’, sans-serif;
background: var(–cinza);
color: var(–texto);
min-height: 100vh;
overflow-x: hidden;
}

/* HEADER */
header {
background: linear-gradient(135deg, var(–azul) 0%, var(–azul-medio) 50%, #0d4a2e 100%);
padding: 24px 16px 20px;
text-align: center;
position: relative;
border-bottom: 3px solid var(–amarelo);
overflow: hidden;
}
header::before {
content: ‘’;
position: absolute; inset: 0;
background: url(“data:image/svg+xml,%3Csvg width=‘60’ height=‘60’ viewBox=‘0 0 60 60’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cg fill=‘none’ fill-rule=‘evenodd’%3E%3Cg fill=’%23ffffff’ fill-opacity=‘0.03’%3E%3Ccircle cx=‘30’ cy=‘30’ r=‘20’/%3E%3C/g%3E%3C/g%3E%3C/svg%3E”);
pointer-events: none;
}
.header-badge {
display: inline-block;
background: var(–amarelo);
color: var(–azul);
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 800;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
padding: 3px 10px;
border-radius: 2px;
margin-bottom: 8px;
}
header h1 {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: clamp(28px, 7vw, 52px);
font-weight: 900;
line-height: 1;
letter-spacing: -1px;
text-transform: uppercase;
color: #fff;
}
header h1 span { color: var(–amarelo); }
.header-sub {
font-size: 13px;
color: rgba(255,255,255,0.6);
margin-top: 6px;
letter-spacing: 1px;
}

/* NAV */
nav {
background: var(–azul);
border-bottom: 1px solid var(–borda);
overflow-x: auto;
scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }
.nav-tabs {
display: flex;
list-style: none;
padding: 0 8px;
min-width: max-content;
}
.nav-tabs li button {
background: none;
border: none;
color: var(–texto-muted);
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 700;
font-size: 14px;
letter-spacing: 1px;
text-transform: uppercase;
padding: 14px 16px;
cursor: pointer;
border-bottom: 3px solid transparent;
transition: all 0.2s;
white-space: nowrap;
}
.nav-tabs li button:hover { color: var(–branco); }
.nav-tabs li button.active {
color: var(–amarelo);
border-bottom-color: var(–amarelo);
}

/* FILTROS */
.filters {
padding: 12px 16px;
background: var(–cinza-claro);
border-bottom: 1px solid var(–borda);
display: flex;
gap: 8px;
flex-wrap: wrap;
align-items: center;
}
.filter-label {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 12px;
font-weight: 700;
letter-spacing: 1px;
color: var(–texto-muted);
text-transform: uppercase;
}
.filter-select {
background: var(–cinza);
border: 1px solid var(–borda);
color: var(–texto);
font-family: ‘Barlow’, sans-serif;
font-size: 13px;
padding: 6px 10px;
border-radius: 4px;
cursor: pointer;
flex: 1;
min-width: 140px;
}
.filter-select:focus { outline: none; border-color: var(–verde); }
.btn-reset {
background: none;
border: 1px solid var(–borda);
color: var(–texto-muted);
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 12px;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
padding: 6px 12px;
border-radius: 4px;
cursor: pointer;
transition: all 0.2s;
}
.btn-reset:hover { border-color: var(–verde); color: var(–verde); }

/* MAIN */
main { padding: 16px; max-width: 900px; margin: 0 auto; }

/* SEÇÃO JOGOS */
.section-title {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 13px;
font-weight: 800;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–verde);
padding: 4px 0 10px;
display: flex;
align-items: center;
gap: 8px;
}
.section-title::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–borda);
}

/* CARD DE JOGO */
.jogo-card {
background: var(–cinza-claro);
border: 1px solid var(–borda);
border-radius: 8px;
margin-bottom: 8px;
overflow: hidden;
transition: border-color 0.2s;
animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.jogo-card:hover { border-color: rgba(255,255,255,0.18); }
.jogo-card.brasil { border-left: 3px solid var(–verde); }
.jogo-card.finalizado { opacity: 0.85; }

.jogo-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 6px 12px;
background: rgba(0,0,0,0.2);
border-bottom: 1px solid var(–borda);
}
.jogo-meta {
font-size: 11px;
color: var(–texto-muted);
font-weight: 500;
letter-spacing: 0.5px;
}
.jogo-grupo {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 11px;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
color: var(–amarelo);
background: rgba(245,197,24,0.1);
padding: 2px 7px;
border-radius: 3px;
}

.jogo-body {
display: grid;
grid-template-columns: 1fr auto 1fr;
align-items: center;
padding: 12px 16px;
gap: 8px;
}
.time {
display: flex;
align-items: center;
gap: 8px;
}
.time.direita { flex-direction: row-reverse; }
.time-bandeira { font-size: 24px; line-height: 1; }
.time-nome {
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 700;
font-size: clamp(14px, 3.5vw, 18px);
text-transform: uppercase;
letter-spacing: 0.5px;
line-height: 1.2;
}
.time-nome small {
display: block;
font-size: 10px;
font-weight: 400;
color: var(–texto-muted);
letter-spacing: 0;
text-transform: none;
font-family: ‘Barlow’, sans-serif;
}

.placar-area {
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
min-width: 90px;
}
.placar-inputs {
display: flex;
align-items: center;
gap: 6px;
}
.placar-input {
width: 36px;
height: 36px;
background: var(–cinza);
border: 1px solid var(–borda);
border-radius: 6px;
color: var(–branco);
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 800;
font-size: 20px;
text-align: center;
cursor: pointer;
transition: border-color 0.2s;
-moz-appearance: textfield;
}
.placar-input::-webkit-outer-spin-button,
.placar-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.placar-input:focus { outline: none; border-color: var(–verde); background: rgba(0,168,107,0.1); }
.placar-input.has-value { background: rgba(0,168,107,0.12); border-color: var(–verde); }
.placar-sep {
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 800;
font-size: 20px;
color: var(–texto-muted);
}
.placar-status {
font-size: 10px;
font-weight: 600;
letter-spacing: 1px;
text-transform: uppercase;
color: var(–texto-muted);
}
.placar-status.ao-vivo { color: #ff4757; animation: pulse 1.5s infinite; }
.placar-status.encerrado { color: var(–verde); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.jogo-local {
grid-column: 1 / -1;
text-align: center;
font-size: 11px;
color: var(–texto-muted);
padding: 0 16px 10px;
display: flex;
align-items: center;
justify-content: center;
gap: 4px;
}

/* CLASSIFICAÇÃO */
.grupo-classificacao {
background: var(–cinza-claro);
border: 1px solid var(–borda);
border-radius: 8px;
margin-bottom: 16px;
overflow: hidden;
}
.grupo-header {
background: var(–azul);
padding: 10px 16px;
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 800;
font-size: 14px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–amarelo);
display: flex;
align-items: center;
gap: 8px;
}
.classificacao-table { width: 100%; border-collapse: collapse; }
.classificacao-table th {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 11px;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
color: var(–texto-muted);
padding: 8px 12px;
text-align: center;
background: rgba(0,0,0,0.15);
border-bottom: 1px solid var(–borda);
}
.classificacao-table th:first-child { text-align: left; }
.classificacao-table td {
padding: 9px 12px;
text-align: center;
font-size: 14px;
border-bottom: 1px solid var(–borda);
}
.classificacao-table tr:last-child td { border-bottom: none; }
.classificacao-table td:first-child { text-align: left; }
.classificacao-table tr:nth-child(1) td:first-child,
.classificacao-table tr:nth-child(2) td:first-child {
border-left: 3px solid var(–verde);
}
.time-row {
display: flex;
align-items: center;
gap: 8px;
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 700;
font-size: 15px;
text-transform: uppercase;
letter-spacing: 0.5px;
}
.time-row .bandeira { font-size: 18px; }
.pos-badge {
width: 20px;
height: 20px;
border-radius: 50%;
background: var(–borda);
display: inline-flex;
align-items: center;
justify-content: center;
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 800;
font-size: 12px;
margin-right: 4px;
}
.pos-1 { background: var(–verde); color: #fff; }
.pos-2 { background: var(–azul-medio); color: #fff; }
.pts { font-family: ‘Barlow Condensed’, sans-serif; font-weight: 800; font-size: 18px; color: var(–branco); }

/* VAZIO */
.empty-state {
text-align: center;
padding: 40px 20px;
color: var(–texto-muted);
}
.empty-state .icon { font-size: 40px; margin-bottom: 8px; }
.empty-state p { font-size: 14px; }

/* FOOTER */
footer {
text-align: center;
padding: 24px 16px;
font-size: 12px;
color: var(–texto-muted);
border-top: 1px solid var(–borda);
margin-top: 16px;
}
footer a { color: var(–verde); text-decoration: none; }

/* CONTADOR */
.contador {
display: flex;
gap: 12px;
padding: 12px 16px;
background: var(–azul);
border-bottom: 1px solid var(–borda);
overflow-x: auto;
scrollbar-width: none;
}
.contador::-webkit-scrollbar { display: none; }
.stat-pill {
display: flex;
align-items: center;
gap: 6px;
background: rgba(255,255,255,0.06);
padding: 6px 12px;
border-radius: 20px;
white-space: nowrap;
flex-shrink: 0;
}
.stat-pill .num {
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 800;
font-size: 16px;
color: var(–amarelo);
}
.stat-pill .lbl {
font-size: 11px;
color: var(–texto-muted);
font-weight: 500;
}

.hidden { display: none !important; }
.jogos-container { margin-top: 8px; }
</style>

</head>

function nomeTime(t) {
  const partes = t.split(' ');
  return partes.slice(1).join(' ');
}
function bandeira(t) {
  return t.split(' ')[0];
}

function renderJogos() {

// ===================== LÓGICA =====================
function calcularClassificacao(letra) {
  const times = GRUPOS[letra].times;
  const stats = {};
  times.forEach(t => stats[nomeTime(t)] = {time:t,j:0,v:0,e:0,d:0,gp:0,gc:0,sg:0,pts:0});

  const jogosGrupo = JOGOS.filter(j => j.grupo === `Grupo ${letra}`);
  jogosGrupo.forEach(j => {
    const p = placares[j.id];
    if (!p || p.g1==='' || p.g2==='') return;
    const g1 = parseInt(p.g1), g2 = parseInt(p.g2);
    const nm = nomeTime(j.mandante), nv = nomeTime(j.visitante);
    if (!stats[nm] || !stats[nv]) return;
    stats[nm].j++; stats[nv].j++;
    stats[nm].gp += g1; stats[nm].gc += g2;
    stats[nv].gp += g2; stats[nv].gc += g1;
    stats[nm].sg = stats[nm].gp - stats[nm].gc;
    stats[nv].sg = stats[nv].gp - stats[nv].gc;
    if (g1 > g2) { stats[nm].v++; stats[nm].pts+=3; stats[nv].d++; }
    else if (g2 > g1) { stats[nv].v++; stats[nv].pts+=3; stats[nm].d++; }
    else { stats[nm].e++; stats[nv].e++; stats[nm].pts++; stats[nv].pts++; }
  });

  return Object.values(stats).sort((a,b) =>
    b.pts-a.pts || b.sg-a.sg || b.gp-a.gp || a.time.localeCompare(b.time)
  );
}

function salvarPlacar(id, val, campo) {
  if (!placares[id]) placares[id] = {g1:'',g2:''};
  placares[id][campo] = val === '' ? '' : Math.max(0, parseInt(val)||0).toString();
  localStorage.setItem('copa2026_placares', JSON.stringify(placares));
  atualizarStats();
  if (tabAtiva === 'classificacao') renderClassificacao();
  if (tabAtiva === 'brasil') renderBrasil();
}

function atualizarStats() {
  let fin = 0, gols = 0;
  JOGOS.forEach(j => {
    const p = placares[j.id];
    if (p && p.g1 !== '' && p.g2 !== '') {
      fin++;
      gols += parseInt(p.g1||0) + parseInt(p.g2||0);
    }
  });
  document.getElementById('statFinalizados').textContent = fin;
  document.getElementById('statGols').textContent = gols;
}

function filtrar() { renderJogos(); }
function resetFiltros() {
  document.getElementById('filtroGrupo').value = '';
  document.getElementById('filtroRodada').value = '';
  renderJogos();
}

function setTab(tab, btn) {
  tabAtiva = tab;
  document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['jogos','classificacao','brasil'].forEach(t => {
    const el = document.getElementById(`tab-${t}`);
    el.classList.toggle('hidden', t !== tab);
  });
  const filtros = document.getElementById('filtrosArea');
  filtros.style.display = tab === 'jogos' ? 'flex' : 'none';

  if (tab === 'jogos') renderJogos();
  if (tab === 'classificacao') renderClassificacao();
  if (tab === 'brasil') renderBrasil();
}
